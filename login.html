<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>เข้าสู่ระบบ - SURIN3 BIKE</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap');
    body { background: #f4f6f9; display: flex; align-items: center; height: 100vh; font-family: 'Sarabun', sans-serif; }
    .login-card { width: 100%; max-width: 400px; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); background: white; border-top: 5px solid #003366; }
    .input-group-text { background-color: #f8f9fa; border-right: none; }
    .form-control { border-left: none; }
    .form-control:focus { border-color: #dee2e6; box-shadow: none; }
    .input-group:focus-within { box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.25); border-radius: 0.375rem; }
    .btn-back { position: absolute; top: 20px; left: 20px; color: #6c757d; text-decoration: none; font-weight: bold; }
    .btn-back:hover { color: #343a40; }
  </style>
</head>
<body>

  <!-- ปุ่มกลับหน้าแรก -->
  <a href="index.html" class="btn-back"><i class="fa-solid fa-arrow-left me-2"></i>กลับหน้าแรก</a>

  <div class="container d-flex justify-content-center">
    <div class="login-card text-center">
      
      <div class="mb-4">
        <i class="fa-solid fa-bicycle fa-3x mb-2" style="color: #003366;"></i>
        <h4 class="fw-bold mb-0" style="color: #003366;">ระบบเจ้าหน้าที่ <br>SURIN3 BIKE</h4>
      </div>
      
      <div id="loginForm">
        <div class="input-group mb-3 shadow-sm rounded">
          <span class="input-group-text text-primary"><i class="fa-solid fa-user"></i></span>
          <input type="text" id="user" class="form-control" placeholder="ชื่อผู้ใช้งาน">
        </div>
        
        <div class="input-group mb-4 shadow-sm rounded">
          <span class="input-group-text text-primary"><i class="fa-solid fa-lock"></i></span>
          <input type="password" id="pass" class="form-control" placeholder="รหัสผ่าน">
          <button class="btn btn-outline-secondary border-start-0" type="button" onclick="togglePassword()" style="border-color: #dee2e6;">
            <i class="fa-solid fa-eye" id="eyeIcon"></i>
          </button>
        </div>
        
        <button class="btn btn-primary w-100 fw-bold py-2 shadow" id="loginBtn" onclick="doLogin()">
          <i class="fa-solid fa-right-to-bracket me-2"></i> เข้าสู่ระบบ
        </button>
        
        <div id="errMsg" class="text-danger mt-3 small fw-bold" style="display:none;"></div>
      </div>
      
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  
  <script>
    // 🚨 นำลิงก์ API มาใส่ตรงนี้ครับ 🚨
    const API_URL = "https://script.google.com/macros/s/AKfycbwwQNmRdCNc5RX_Odpk2fjs_F8GaLzSI7Ysb5MuCwKMEuX6WXQTz5MkzHiVHcdw_AoV/exec";

    function togglePassword() {
      const passInput = document.getElementById('pass');
      const eyeIcon = document.getElementById('eyeIcon');
      if (passInput.type === 'password') { passInput.type = 'text'; eyeIcon.classList.replace('fa-eye', 'fa-eye-slash'); } 
      else { passInput.type = 'password'; eyeIcon.classList.replace('fa-eye-slash', 'fa-eye'); }
    }

    document.getElementById("pass").addEventListener("keypress", function(e) { if (e.key === "Enter") doLogin(); });
    document.getElementById("user").addEventListener("keypress", function(e) { if (e.key === "Enter") document.getElementById("pass").focus(); });

    async function doLogin() {
      const u = document.getElementById('user').value.trim();
      const p = document.getElementById('pass').value.trim();
      const btn = document.getElementById('loginBtn');
      const err = document.getElementById('errMsg');

      if(!u || !p) {
          err.innerHTML = "<i class='fa-solid fa-circle-exclamation me-1'></i> กรุณากรอกข้อมูลให้ครบถ้วน";
          err.style.display = "block"; return;
      }

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>กำลังตรวจสอบ...';
      err.style.display = "none";

      try {
        // ยิงข้อมูลไปเช็คที่ Google Apps Script API
        const response = await fetch(API_URL, {
          method: 'POST',
          body: JSON.stringify({ action: 'login', user: u, pass: p })
        });
        const res = await response.json();

        if (res.status === "success") {
          sessionStorage.setItem('userName', res.name);
          sessionStorage.setItem('userRole', res.role);
          
          Swal.fire({
            icon: 'success', title: 'เข้าสู่ระบบสำเร็จ!', text: 'ยินดีต้อนรับคุณ ' + res.name, showConfirmButton: false, timer: 1500
          }).then(() => {
            // ล็อกอินผ่าน ให้วิ่งไปหน้า Admin
            window.location.href = "admin.html";
          });
        } else {
          err.innerHTML = "<i class='fa-solid fa-circle-xmark me-1'></i> " + res.message;
          err.style.display = "block";
          btn.disabled = false;
          btn.innerHTML = '<i class="fa-solid fa-right-to-bracket me-2"></i> เข้าสู่ระบบ';
        }
      } catch (error) {
        err.innerHTML = "<strong>❌ การเชื่อมต่อขัดข้อง:</strong> " + error.message;
        err.style.display = "block";
        btn.disabled = false;
        btn.innerHTML = '<i class="fa-solid fa-right-to-bracket me-2"></i> เข้าสู่ระบบ';
      }
    }
  </script>
</body>
</html>
